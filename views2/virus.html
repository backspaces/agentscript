<html>
    <head>
        <title>Virus</title>
    </head>

    <body>
        <script type="module">
            import Animator from 'https://agentscript.org/src/Animator.js'
            import TwoDraw from 'https://agentscript.org/src/TwoDraw.js'
            // import Model from 'https://agentscript.org/models/VirusModel.js'
            import Model from '/models/VirusModel.js'

            const model = new Model()
            model.setup()

            const turtleColors = {
                infected: 'red',
                susceptible: 'blue',
                resistant: 'gray',
            }
            function isResistant(l) {
                return (
                    l.end0.state === 'resistant' || l.end1.state === 'resistant'
                )
            }
            const view = new TwoDraw(model, {
                div: 'modelDiv',
                patchSize: 10,
                drawOptions: {
                    patchesColor: 'black',
                    turtlesShape: 'circle',
                    turtlesSize: 1.5,
                    turtlesColor: t => turtleColors[t.state],
                    // linksColor: 'white',
                    linksColor: l => (isResistant(l) ? 'gray' : 'white'),
                    linksWidth: 2,
                },
            })

            const anim = new Animator(
                () => {
                    model.step()
                    view.draw()
                    if (model.done) anim.stop()
                },
                -1, // how many steps
                30 // at fps steps/second
            )
        </script>
        <div id="modelDiv"></div>
    </body>
</html>
