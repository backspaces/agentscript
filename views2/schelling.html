<html>
    <head>
        <title>Schelling</title>
    </head>

    <body>
        <script type="module">
            import Animator from 'https://agentscript.org/src/Animator.js'
            import Model from 'https://agentscript.org/models/SchellingModel.js'
            import TwoDraw from 'https://agentscript.org/src/TwoDraw.js'

            const model = new Model()
            model.setup()

            const view = new TwoDraw(model, {
                div: 'modelDiv',
                patchSize: 10,
                drawOptions: {
                    patchesColor: 'white',
                    turtlesColor: t => (t.breed.name === 'Os' ? 'red' : 'blue'),
                    turtlesShape: 'square',
                    turtlesRotate: false,
                },
            })

            const anim = new Animator(
                () => {
                    model.step()
                    view.draw()
                    if (model.done) anim.stop()
                },
                -1,
                5
            )
        </script>
        <div id="modelDiv"></div>
    </body>
</html>
