<!doctype html>
<html>
    <head>
        <title>HelloGuiDiv</title>
    </head>

    <body>
        <script type="module">
            import * as util from '/src/utils.js'
            import Model from '/models/HelloModel.js'
            import Animator from '/src/Animator.js'
            import TwoDraw from '/src/TwoDraw.js'

            import GUIDiv from '/src/GUIDiv.js'

            const model = new Model()
            model.setup()

            const view = new TwoDraw(model, {
                div: 'modelDiv',
                patchSize: 20,
                drawOptions: {
                    turtlesSize: 3,
                },
            })

            const anim = new Animator(
                () => {
                    model.step()
                    view.draw()
                },
                -1, // run forever, use GUI to start/stop
                30 // 30 fps
            )

            // Each of the 7 gui types:
            new GUIDiv(
                {
                    fps: {
                        slider: [30, [5, 60, 5]],
                        cmd: val => anim.setFps(val),
                    },
                    turtlesShape: {
                        chooser: ['bug', ['bug', 'dart', 'person']],
                        cmd: val => (view.drawOptions.turtlesShape = val),
                    },
                    turtlesColor: {
                        color: '#ff0000',
                        cmd: val => (view.drawOptions.turtlesColor = val),
                    },
                    '---': {},
                    pause: {
                        switch: false,
                        cmd: val => {
                            if (val) {
                                anim.stop()
                            } else {
                                anim.start()
                            }
                        },
                    },
                    setTitle: {
                        input: document.title,
                        cmd: val => (document.title = val),
                    },
                    downloadCanvas: {
                        button: () => view.downloadCanvas(),
                    },
                    modelTicks: {
                        monitor: [model, 'ticks'],
                    },
                },
                {
                    divId: 'controlsDiv',
                    title: 'Hello GuiDiv',
                }
            )
        </script>

        <div id="controlsDiv"></div>
        <div id="modelDiv"></div>
    </body>
</html>
