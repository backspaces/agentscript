<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireModel — Parameter Sweep</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --muted: #666;
    --accent-green: rgba(80, 210, 130, 1);
    --accent-orange: rgba(255, 160, 80, 1);
    --accent-red: #ff4444;
    --font-mono: 'Space Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    gap: 20px;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(80,210,130,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(80,210,130,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .title {
    font-family: var(--font-display);
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent-green) 30%, var(--accent-orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px;
    width: min(700px, 95vw);
    position: relative;
    z-index: 1;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px 24px;
  }

  @media (max-width: 520px) {
    .controls-grid { grid-template-columns: 1fr; }
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .control-name {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .control-value {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent-green);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-green);
    cursor: pointer; border: none;
  }

  .density-preview {
    color: var(--muted);
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 16px;
  }

  button {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 9px 22px;
    border: 1px solid var(--accent-green);
    border-radius: 2px;
    background: transparent;
    color: var(--accent-green);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  button:hover { background: var(--accent-green); color: #0f0f0f; }

  button.stop {
    border-color: var(--accent-red);
    color: var(--accent-red);
  }
  button.stop:hover { background: var(--accent-red); color: #0f0f0f; }

  .status {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    text-align: right;
  }

  .status span { color: var(--text); }

  .chart-wrapper {
    width: min(700px, 95vw);
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
  }

  canvas { display: block; width: 100% !important; }

  .progress-bar-wrap {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    margin-top: 10px;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-orange));
    transition: width 0.2s;
    border-radius: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="title">FIREMODEL SWEEP</div>
  <div class="subtitle">AgentScript · Parameter Exploration</div>
</header>

<div class="panel">
  <div class="controls-grid">
    <div class="control-group">
      <div class="control-label">
        <span class="control-name">N Densities</span>
        <span class="control-value" id="val-n">5</span>
      </div>
      <input type="range" id="sl-n" min="2" max="40" value="5">
      <div class="density-preview" id="density-preview">10, 30, 50, 70, 90</div>
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="control-name">Runs / Density</span>
        <span class="control-value" id="val-runs">6</span>
      </div>
      <input type="range" id="sl-runs" min="2" max="20" value="6">
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="control-name">Workers</span>
        <span class="control-value" id="val-workers">4</span>
      </div>
      <input type="range" id="sl-workers" min="1" max="16" value="4">
    </div>
  </div>
  <div class="actions">
    <button id="btn-start">▶ Start</button>
    <div class="status" id="status">Ready</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>

<div class="chart-wrapper">
  <canvas id="chart-canvas" height="340"></canvas>
</div>

<script type="module">

// ── Controls ──────────────────────────────────────────────────────────────────

const slN       = document.getElementById('sl-n');
const slRuns    = document.getElementById('sl-runs');
const slWorkers = document.getElementById('sl-workers');
const valN      = document.getElementById('val-n');
const valRuns   = document.getElementById('val-runs');
const valWorkers= document.getElementById('val-workers');
const densityPreview = document.getElementById('density-preview');
const btnStart  = document.getElementById('btn-start');
const statusEl  = document.getElementById('status');
const progressBar = document.getElementById('progress-bar');

function getDensities(n) {
  if (n === 1) return [50];
  const result = [];
  for (let i = 0; i < n; i++) {
    result.push(Math.round(10 + (i / (n - 1)) * 80));
  }
  return result;
}

function updatePreview() {
  const densities = getDensities(+slN.value);
  densityPreview.textContent = densities.join(', ');
}

slN.addEventListener('input', () => { valN.textContent = slN.value; updatePreview(); });
slRuns.addEventListener('input', () => { valRuns.textContent = slRuns.value; });
slWorkers.addEventListener('input', () => { valWorkers.textContent = slWorkers.value; });
updatePreview();

// ── Chart ─────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('chart-canvas');
const chart = new Chart(canvas, {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'Burned Trees',
        data: [],
        backgroundColor: 'rgba(80, 210, 130, 0.75)',
        pointRadius: 3,
        yAxisID: 'yLeft',
      },
      {
        label: 'Fraction Burned',
        data: [],
        backgroundColor: 'rgba(255, 160, 80, 0.75)',
        pointRadius: 3,
        yAxisID: 'yRight',
      }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
      legend: {
        labels: {
          color: '#aaa',
          font: { family: 'Space Mono', size: 11 },
          boxWidth: 10,
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        min: 10, max: 90,
        title: { display: true, text: 'Density (%)', color: '#666', font: { family: 'Space Mono', size: 11 } },
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: { color: '#555', font: { family: 'Space Mono', size: 10 } }
      },
      yLeft: {
        type: 'logarithmic',
        position: 'left',
        title: { display: true, text: 'Burned Trees (log)', color: 'rgba(80,210,130,0.8)', font: { family: 'Space Mono', size: 11 } },
        grid: { color: 'rgba(255,255,255,0.04)' },
        ticks: { color: '#555', font: { family: 'Space Mono', size: 10 } }
      },
      yRight: {
        type: 'linear',
        position: 'right',
        min: 0, max: 1,
        title: { display: true, text: 'Fraction Burned', color: 'rgba(255,160,80,0.8)', font: { family: 'Space Mono', size: 11 } },
        grid: { drawOnChartArea: false },
        ticks: { color: '#555', font: { family: 'Space Mono', size: 10 } }
      }
    }
  }
});

// ── Worker pool ───────────────────────────────────────────────────────────────

const workerSrc = `
import Model from 'https://agentscript.org/models/FireModel.js'
self.onmessage = ({ data: { density, taskId } }) => {
  const model = new Model()
  model.density = density
  model.setup()
  while (!model.done) model.step()
  self.postMessage({
    density,
    burnedTrees: model.burnedTrees,
    initialTrees: model.initialTrees,
    steps: model.ticks,
    taskId
  })
}
`;

let workers = [];
let taskQueue = [];
let results = [];
let totalTasks = 0;
let completedTasks = 0;
let running = false;

function stopAll() {
  workers.forEach(w => w.terminate());
  workers = [];
  running = false;
  btnStart.textContent = '▶ Start';
  btnStart.classList.remove('stop');
  btnStart.onclick = startSweep;
}

function startSweep() {
  // Clear chart
  chart.data.datasets[0].data = [];
  chart.data.datasets[1].data = [];
  chart.update('none');
  results = [];
  completedTasks = 0;

  const n       = +slN.value;
  const runsEach= +slRuns.value;
  const nWorkers= +slWorkers.value;
  const densities = getDensities(n);

  taskQueue = [];
  let taskId = 0;
  for (const density of densities) {
    for (let r = 0; r < runsEach; r++) {
      taskQueue.push({ density, taskId: taskId++ });
    }
  }
  totalTasks = taskQueue.length;

  statusEl.innerHTML = `<span>0</span>/${totalTasks} runs complete`;
  progressBar.style.width = '0%';

  running = true;
  btnStart.textContent = '■ Stop';
  btnStart.classList.add('stop');
  btnStart.onclick = () => {
    stopAll();
    statusEl.textContent = `Stopped at ${completedTasks}/${totalTasks}`;
    if (results.length) console.table(results.map(r => ({
      x: r.density, density: r.density, burnedTrees: r.burnedTrees,
      fraction: r.fraction.toFixed(4), steps: r.steps
    })));
  };

  const workerUrl = URL.createObjectURL(new Blob([workerSrc], { type: 'text/javascript' }));

  function dispatchTask(worker) {
    if (taskQueue.length === 0) return;
    worker.postMessage(taskQueue.shift());
  }

  function onResult(e) {
    if (!running) return;
    const { density, burnedTrees, initialTrees, steps } = e.data;
    const fraction = burnedTrees / initialTrees;
    completedTasks++;

    chart.data.datasets[0].data.push({ x: density, y: burnedTrees });
    chart.data.datasets[1].data.push({ x: density, y: fraction });
    chart.update('none');

    results.push({ density, burnedTrees, initialTrees, fraction, steps });

    const pct = (completedTasks / totalTasks * 100).toFixed(0);
    statusEl.innerHTML = `<span>${completedTasks}</span>/${totalTasks} runs complete`;
    progressBar.style.width = pct + '%';

    if (completedTasks === totalTasks) {
      stopAll();
      statusEl.innerHTML = `<span>${totalTasks}</span>/${totalTasks} — complete`;
      progressBar.style.width = '100%';
      console.table(results.map(r => ({
        x: r.density, density: r.density, burnedTrees: r.burnedTrees,
        fraction: +r.fraction.toFixed(4), steps: r.steps
      })));
      return;
    }

    // Send next task to this worker
    if (taskQueue.length > 0) {
      dispatchTask(e.target);
    }
  }

  for (let i = 0; i < Math.min(nWorkers, totalTasks); i++) {
    const w = new Worker(workerUrl, { type: 'module' });
    w.onmessage = onResult;
    workers.push(w);
    dispatchTask(w);
  }
}

btnStart.onclick = startSweep;

</script>
</body>
</html>
