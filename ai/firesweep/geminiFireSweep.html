<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireModel Parameter Sweep</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            width: min(700px, 95vw);
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label { font-size: 0.9rem; color: #aaa; }
        
        input[type="range"] { width: 100%; cursor: pointer; }

        button {
            grid-column: 1 / -1;
            padding: 12px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #4caf50;
            color: white;
            transition: background 0.2s;
        }

        button.running { background: #f44336; }

        #status {
            margin-bottom: 10px;
            font-family: monospace;
            color: #80d282;
        }

        .chart-container {
            width: min(700px, 95vw);
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h2>FireModel Parameter Sweep</h2>

    <div class="controls">
        <div class="control-group">
            <label>N Densities: <span id="nVal">5</span></label>
            <input type="range" id="nDensities" min="2" max="40" value="5">
        </div>
        <div class="control-group">
            <label>Runs per Density: <span id="rVal">6</span></label>
            <input type="range" id="runsPerDensity" min="2" max="20" value="6">
        </div>
        <div class="control-group">
            <label>Workers: <span id="wVal">4</span></label>
            <input type="range" id="workers" min="1" max="16" value="4">
        </div>
        <button id="startBtn">Start Sweep</button>
    </div>

    <div id="status">Ready</div>

    <div class="chart-container">
        <canvas id="fireChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

    <script type="module">
        const ctx = document.getElementById('fireChart').getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        
        // UI Feedback
        const inputs = ['nDensities', 'runsPerDensity', 'workers'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            el.oninput = () => document.getElementById(id[0] + 'Val').textContent = el.value;
        });

        // Chart Setup
        const chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    {
                        label: 'Burned Trees',
                        data: [],
                        backgroundColor: 'rgba(80, 210, 130, 0.75)',
                        pointRadius: 3,
                        yAxisID: 'yLeft',
                    },
                    {
                        label: 'Fraction Burned',
                        data: [],
                        backgroundColor: 'rgba(255, 160, 80, 0.75)',
                        pointRadius: 3,
                        yAxisID: 'yRight',
                    }
                ]
            },
            options: {
                animation: false,
                scales: {
                    x: {
                        type: 'linear',
                        min: 10, max: 90,
                        title: { display: true, text: 'Density (%)', color: '#ccc' },
                        grid: { color: '#444' }
                    },
                    yLeft: {
                        type: 'logarithmic',
                        position: 'left',
                        title: { display: true, text: 'Burned Trees (log)', color: 'rgba(80, 210, 130, 0.9)' },
                        grid: { color: '#444' }
                    },
                    yRight: {
                        type: 'linear',
                        position: 'right',
                        min: 0, max: 1,
                        title: { display: true, text: 'Fraction Burned', color: 'rgba(255, 160, 80, 0.9)' },
                        grid: { display: false }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#ccc' } }
                }
            }
        });

        // Worker Source
        const workerSrc = `
            import Model from 'https://agentscript.org/models/FireModel.js'
            self.onmessage = ({ data: { density, taskId } }) => {
                const model = new Model()
                model.density = density
                model.setup()
                while (!model.done) model.step()
                self.postMessage({
                    density,
                    burnedTrees: model.burnedTrees,
                    initialTrees: model.initialTrees,
                    steps: model.ticks,
                    taskId
                })
            }
        `;
        const workerUrl = URL.createObjectURL(new Blob([workerSrc], { type: 'text/javascript' }));

        let activeWorkers = [];
        let taskQueue = [];
        let results = [];
        let totalTasks = 0;
        let completedTasks = 0;
        let isRunning = false;

        function updateStatus() {
            statusEl.textContent = `${completedTasks} / ${totalTasks} runs complete`;
        }

        function stopSweep() {
            isRunning = false;
            activeWorkers.forEach(w => w.terminate());
            activeWorkers = [];
            startBtn.textContent = "Start Sweep";
            startBtn.classList.remove('running');
            console.table(results);
        }

        function runNextTask(worker) {
            if (!isRunning || taskQueue.length === 0) return;
            const task = taskQueue.shift();
            worker.postMessage(task);
        }

        startBtn.onclick = () => {
            if (isRunning) {
                stopSweep();
                return;
            }

            // Reset
            isRunning = true;
            results = [];
            completedTasks = 0;
            chart.data.datasets[0].data = [];
            chart.data.datasets[1].data = [];
            chart.update();
            startBtn.textContent = "Stop Sweep";
            startBtn.classList.add('running');

            const n = parseInt(document.getElementById('nDensities').value);
            const r = parseInt(document.getElementById('runsPerDensity').value);
            const wCount = parseInt(document.getElementById('workers').value);

            // Generate densities evenly from 10 to 90
            const densities = [];
            for (let i = 0; i < n; i++) {
                densities.push(Math.round(10 + (i * (80 / (n - 1)))));
            }

            // Create Task Queue
            taskQueue = [];
            densities.forEach(d => {
                for (let i = 0; i < r; i++) {
                    taskQueue.push({ density: d, taskId: taskQueue.length });
                }
            });
            totalTasks = taskQueue.length;
            updateStatus();

            // Initialize Workers
            for (let i = 0; i < wCount; i++) {
                const worker = new Worker(workerUrl, { type: 'module' });
                worker.onmessage = (e) => {
                    const res = e.data;
                    const fraction = res.burnedTrees / res.initialTrees;
                    
                    results.push({
                        x: res.density,
                        density: res.density,
                        burnedTrees: res.burnedTrees,
                        fraction: fraction.toFixed(4),
                        steps: res.steps
                    });

                    chart.data.datasets[0].data.push({ x: res.density, y: res.burnedTrees });
                    chart.data.datasets[1].data.push({ x: res.density, y: fraction });
                    chart.update('none');

                    completedTasks++;
                    updateStatus();

                    if (taskQueue.length > 0) {
                        runNextTask(worker);
                    } else if (completedTasks === totalTasks) {
                        stopSweep();
                        statusEl.textContent = `Sweep Complete: ${totalTasks} runs.`;
                    }
                };
                activeWorkers.push(worker);
                runNextTask(worker);
            }
        };
    </script>
</body>
</html>
