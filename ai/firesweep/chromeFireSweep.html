<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScript FireModel Sweep</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: min(700px, 95vw);
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-size: 0.9rem; color: #bbb; }
        input[type="range"] { cursor: pointer; }
        button {
            grid-column: 1 / -1;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #4a90e2;
            color: white;
            transition: background 0.2s;
        }
        button.running { background: #e74c3c; }
        #status { margin-bottom: 10px; font-weight: 500; color: #80d282; }
        .chart-container {
            width: min(700px, 95vw);
            background: #252525;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label>N Densities: <span id="v-n">5</span></label>
            <input type="range" id="n-densities" min="2" max="40" value="5">
        </div>
        <div class="control-group">
            <label>Runs per Density: <span id="v-runs">6</span></label>
            <input type="range" id="runs-per" min="2" max="20" value="6">
        </div>
        <div class="control-group">
            <label>Workers: <span id="v-workers">4</span></label>
            <input type="range" id="workers" min="1" max="16" value="4">
        </div>
        <button id="startBtn">Start Sweep</button>
    </div>

    <div id="status">Ready</div>
    
    <div class="chart-container">
        <canvas id="sweepChart"></canvas>
    </div>

    <script type="module">
        const ctx = document.getElementById('sweepChart').getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        
        // Link spans to sliders
        ['n-densities', 'runs-per', 'workers'].forEach(id => {
            const el = document.getElementById(id);
            const val = document.getElementById(`v-${id.split('-')[0] === 'n' ? 'n' : id.split('-')[0]}`);
            el.oninput = () => val.textContent = el.value;
        });

        const chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    {
                        label: 'Burned Trees',
                        data: [],
                        backgroundColor: 'rgba(80, 210, 130, 0.75)',
                        pointRadius: 3,
                        yAxisID: 'yLeft',
                    },
                    {
                        label: 'Fraction Burned',
                        data: [],
                        backgroundColor: 'rgba(255, 160, 80, 0.75)',
                        pointRadius: 3,
                        yAxisID: 'yRight',
                    }
                ]
            },
            options: {
                animation: false,
                scales: {
                    x: { type: 'linear', min: 10, max: 90, title: { display: true, text: 'Density (%)', color: '#ccc' }, grid: { color: '#444' } },
                    yLeft: { type: 'logarithmic', position: 'left', title: { display: true, text: 'Burned Trees (log)', color: 'rgba(80, 210, 130, 0.9)' }, grid: { color: '#333' } },
                    yRight: { type: 'linear', position: 'right', min: 0, max: 1, title: { display: true, text: 'Fraction Burned', color: 'rgba(255, 160, 80, 0.9)' }, grid: { drawOnChartArea: false } }
                },
                plugins: { legend: { labels: { color: '#ccc' } } }
            }
        });

        const workerSrc = `
            import Model from 'https://agentscript.org/models/FireModel.js'
            self.onmessage = ({ data: { density, taskId } }) => {
                const model = new Model()
                model.density = density
                model.setup()
                while (!model.done) model.step()
                self.postMessage({ 
                    density, 
                    burnedTrees: model.burnedTrees, 
                    initialTrees: model.initialTrees, 
                    steps: model.ticks, 
                    taskId 
                })
            }
        `;
        const workerUrl = URL.createObjectURL(new Blob([workerSrc], { type: 'text/javascript' }));

        let activeWorkers = [];
        let taskQueue = [];
        let results = [];
        let isRunning = false;
        let totalTasks = 0;

        function updateProgress() {
            statusEl.textContent = `${results.length} / ${totalTasks} runs complete`;
        }

        function stopSweep() {
            isRunning = false;
            activeWorkers.forEach(w => w.terminate());
            activeWorkers = [];
            taskQueue = [];
            startBtn.textContent = "Start Sweep";
            startBtn.classList.remove('running');
            console.table(results.map(r => ({
                x: r.density,
                density: r.density,
                burnedTrees: r.burnedTrees,
                fraction: (r.burnedTrees / r.initialTrees).toFixed(4),
                steps: r.steps
            })));
        }

        function runTask(worker) {
            if (!isRunning || taskQueue.length === 0) return;
            const task = taskQueue.shift();
            worker.postMessage(task);
        }

        startBtn.onclick = () => {
            if (isRunning) {
                stopSweep();
                return;
            }

            // Reset
            isRunning = true;
            results = [];
            chart.data.datasets[0].data = [];
            chart.data.datasets[1].data = [];
            chart.update();
            startBtn.textContent = "Stop";
            startBtn.classList.add('running');

            // Setup Tasks
            const n = parseInt(document.getElementById('n-densities').value);
            const runs = parseInt(document.getElementById('runs-per').value);
            const numWorkers = parseInt(document.getElementById('workers').value);
            
            const step = (90 - 10) / (n - 1);
            for (let i = 0; i < n; i++) {
                const density = Math.round(10 + (i * step));
                for (let r = 0; r < runs; r++) {
                    taskQueue.push({ density, taskId: taskQueue.length });
                }
            }
            totalTasks = taskQueue.length;
            updateProgress();

            // Spawn Workers
            for (let i = 0; i < numWorkers; i++) {
                const worker = new Worker(workerUrl, { type: 'module' });
                worker.onmessage = ({ data }) => {
                    results.push(data);
                    const fraction = data.burnedTrees / data.initialTrees;
                    
                    chart.data.datasets[0].data.push({ x: data.density, y: data.burnedTrees });
                    chart.data.datasets[1].data.push({ x: data.density, y: fraction });
                    chart.update('none');
                    
                    updateProgress();
                    if (taskQueue.length > 0) {
                        runTask(worker);
                    } else if (results.length === totalTasks) {
                        stopSweep();
                        statusEl.textContent = "Sweep Complete";
                    }
                };
                activeWorkers.push(worker);
                runTask(worker);
            }
        };
    </script>
</body>
</html>
