<html>
<head>
    <title>Fire Model — Density Sweep</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #1a1a1a;
            color: #eee;
        }
        h2 { margin-bottom: 16px; }
        .controls {
            display: flex;
            gap: 32px;
            align-items: flex-end;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.9rem;
        }
        .val { font-weight: bold; color: #7df; }
        input[type=range] { width: 160px; }
        button {
            padding: 8px 28px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #4a9;
            color: white;
        }
        button.stop { background: #a44; }
        #chartContainer { width: 700px; }
        #status { margin-top: 8px; font-size: 0.85rem; color: #aaa; min-height: 1.2em; }
    </style>
</head>
<body>
    <h2>Fire Model: Density Sweep</h2>
    <div class="controls">
        <label>
            N density values: <span id="nVal" class="val">5</span>
            <input type="range" id="nSlider" min="2" max="40" step="1" value="5">
        </label>
        <label>
            Runs per density: <span id="runsVal" class="val">6</span>
            <input type="range" id="runsSlider" min="2" max="20" step="1" value="6">
        </label>
        <label>
            Workers: <span id="workersVal" class="val">4</span>
            <input type="range" id="workersSlider" min="1" max="16" step="1" value="4">
        </label>
        <button id="startBtn">Start</button>
    </div>
    <div id="chartContainer">
        <canvas id="chart"></canvas>
    </div>
    <div id="status"></div>

    <script type="module">
        const nSlider       = document.getElementById('nSlider')
        const runsSlider    = document.getElementById('runsSlider')
        const workersSlider = document.getElementById('workersSlider')
        const nVal          = document.getElementById('nVal')
        const runsVal       = document.getElementById('runsVal')
        const workersVal    = document.getElementById('workersVal')
        const startBtn      = document.getElementById('startBtn')
        const status        = document.getElementById('status')
        const canvas        = document.getElementById('chart')

        nSlider.addEventListener('input',       () => nVal.textContent       = nSlider.value)
        runsSlider.addEventListener('input',    () => runsVal.textContent    = runsSlider.value)
        workersSlider.addEventListener('input', () => workersVal.textContent = workersSlider.value)

        // Worker code as inline ES module Blob
        const workerSrc = `
import Model from 'https://agentscript.org/models/FireModel.js'
self.onmessage = ({ data: { density, taskId } }) => {
    const model = new Model()
    model.density = density
    model.setup()
    while (!model.done) model.step()
    self.postMessage({
        density,
        burnedTrees: model.burnedTrees,
        initialTrees: model.initialTrees,
        steps: model.ticks,
        taskId
    })
}
`
        const workerUrl = URL.createObjectURL(new Blob([workerSrc], { type: 'text/javascript' }))

        // Chart.js setup
        const chart = new Chart(canvas, {
            type: 'scatter',
            data: {
                datasets: [
                    {
                        label: 'Burned Trees',
                        data: [],
                        backgroundColor: 'rgba(80, 210, 130, 0.75)',
                        pointRadius: 3,
                        yAxisID: 'yLeft',
                    },
                    {
                        label: 'Fraction Burned',
                        data: [],
                        backgroundColor: 'rgba(255, 160, 80, 0.75)',
                        pointRadius: 3,
                        yAxisID: 'yRight',
                    }
                ]
            },
            options: {
                animation: false,
                plugins: {
                    legend: { labels: { color: '#ccc' } }
                },
                scales: {
                    x: {
                        type: 'linear',
                        min: 10, max: 90,
                        title: { display: true, text: 'Density (%)', color: '#ccc' },
                        ticks: { color: '#aaa' },
                        grid: { color: '#2a2a2a' }
                    },
                    yLeft: {
                        type: 'logarithmic',
                        position: 'left',
                        title: { display: true, text: 'Burned Trees (log)', color: 'rgba(80, 210, 130, 0.9)' },
                        ticks: { color: 'rgba(80, 210, 130, 0.8)' },
                        grid: { color: '#2a2a2a' }
                    },
                    yRight: {
                        type: 'linear',
                        position: 'right',
                        min: 0, max: 1,
                        title: { display: true, text: 'Fraction Burned', color: 'rgba(255, 160, 80, 0.9)' },
                        ticks: { color: 'rgba(255, 160, 80, 0.8)' },
                        grid: { drawOnChartArea: false }
                    }
                }
            }
        })

        // Store all points for console.table
        let points   = []
        let workers  = []
        let running  = false

        function stopWorkers() {
            for (const w of workers) w.terminate()
            workers = []
        }

        function printResults() {
            console.table(points.map(p => ({
                x:           p.x,
                density:     p.x + '%',
                burnedTrees: p.burnedTrees,
                fraction:    +(p.burnedTrees / p.initialTrees).toFixed(3),
                steps:       p.steps
            })))
        }

        startBtn.addEventListener('click', () => {
            if (running) {
                stopWorkers()
                running = false
                startBtn.textContent = 'Start'
                startBtn.classList.remove('stop')
                status.textContent = `Stopped at ${points.length} points.`
                printResults()
                return
            }

            // Reset
            running = true
            startBtn.textContent = 'Stop'
            startBtn.classList.add('stop')
            points = []
            chart.data.datasets[0].data = []
            chart.data.datasets[1].data = []
            chart.update('none')

            const N          = parseInt(nSlider.value)
            const runs       = parseInt(runsSlider.value)
            const numWorkers = parseInt(workersSlider.value)

            // N evenly spaced densities from 10 to 90
            const densities = Array.from({ length: N }, (_, i) =>
                N === 1 ? 50 : Math.round(10 + (i / (N - 1)) * 80)
            )

            // Build task queue
            const tasks = []
            let taskId = 0
            for (const density of densities)
                for (let r = 0; r < runs; r++)
                    tasks.push({ density, taskId: taskId++ })

            const total = tasks.length
            let done = 0
            let next = 0

            function dispatchTo(worker) {
                if (next < tasks.length) worker.postMessage(tasks[next++])
            }

            workers = Array.from({ length: Math.min(numWorkers, tasks.length) }, () => {
                const w = new Worker(workerUrl, { type: 'module' })
                w.onmessage = ({ data: { density, burnedTrees, initialTrees, steps } }) => {
                    const fraction = burnedTrees / initialTrees
                    points.push({ x: density, burnedTrees, initialTrees, steps })

                    chart.data.datasets[0].data.push({ x: density, y: burnedTrees })
                    chart.data.datasets[1].data.push({ x: density, y: fraction })
                    chart.update('none')

                    done++
                    status.textContent = `${done}/${total} runs complete`

                    if (next < tasks.length) {
                        dispatchTo(w)
                    } else if (done === total) {
                        stopWorkers()
                        running = false
                        startBtn.textContent = 'Start'
                        startBtn.classList.remove('stop')
                        status.textContent = `Done — ${points.length} points plotted.`
                        printResults()
                    }
                }
                dispatchTo(w)
                return w
            })
        })
    </script>
</body>
</html>
