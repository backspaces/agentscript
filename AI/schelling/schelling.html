<html>
    <head>
        <title>Schelling Segregation</title>
    </head>
    <body>
        <div
            style="
                display: flex;
                flex-direction: column;
                align-items: center;
                font-family: sans-serif;
                padding: 16px;
                gap: 8px;
            "
        >
            <div style="font-size: 1.4em; font-weight: bold">
                Schelling Segregation Model
            </div>
            <div
                id="controls"
                style="
                    display: flex;
                    gap: 16px;
                    align-items: center;
                    flex-wrap: wrap;
                    font-size: 14px;
                "
            >
                <label
                    >Density:
                    <input
                        id="density"
                        type="range"
                        min="1"
                        max="99"
                        value="70"
                    />
                    <span id="densityVal">70</span>%</label
                >
                <label
                    >Tolerance:
                    <input
                        id="tolerance"
                        type="range"
                        min="0"
                        max="100"
                        value="50"
                    />
                    <span id="toleranceVal">50</span>%</label
                >
                <button id="setupBtn">Setup</button>
                <button id="goBtn">Go</button>
            </div>
            <div id="modelDiv"></div>
            <div id="status" style="font-size: 15px">
                Tick: 0 &nbsp; Happy: 0%
            </div>
        </div>

        <script type="module">
            import Animator from 'https://agentscript.org/src/Animator.js'
            import TwoDraw from 'https://agentscript.org/src/TwoDraw.js'
            import SchellingModel from './SchellingModel.js'

            let model, view, anim

            const densitySlider = document.getElementById('density')
            const toleranceSlider = document.getElementById('tolerance')
            const densityVal = document.getElementById('densityVal')
            const toleranceVal = document.getElementById('toleranceVal')
            const statusDiv = document.getElementById('status')
            const goBtn = document.getElementById('goBtn')

            densitySlider.addEventListener(
                'input',
                () => (densityVal.textContent = densitySlider.value)
            )
            toleranceSlider.addEventListener(
                'input',
                () => (toleranceVal.textContent = toleranceSlider.value)
            )

            const drawOptions = {
                patchesColor: p => {
                    if (p.turtlesHere.length === 0) return 'white'
                    return p.turtlesHere[0].group === 0 ? 'blue' : 'red'
                },
                turtlesSize: 0,
            }

            function updateStatus() {
                statusDiv.textContent = `Tick: ${model.ticks}  Happy: ${model.percentHappy}%`
            }

            function setup() {
                if (anim) anim.stop()
                goBtn.textContent = 'Go'

                model = new SchellingModel()
                model.density = parseInt(densitySlider.value)
                model.tolerance = parseInt(toleranceSlider.value)
                model.setup()

                view = new TwoDraw(model, {
                    div: 'modelDiv',
                    patchSize: 8,
                    drawOptions,
                })
                view.draw()
                updateStatus()
            }

            document.getElementById('setupBtn').addEventListener('click', setup)

            goBtn.addEventListener('click', () => {
                if (!model) return
                if (anim && anim.isRunning()) {
                    anim.stop()
                    goBtn.textContent = 'Go'
                    return
                }
                goBtn.textContent = 'Stop'
                anim = new Animator(
                    () => {
                        model.step()
                        view.draw()
                        updateStatus()
                        if (model.done) {
                            anim.stop()
                            goBtn.textContent = 'Go'
                        }
                    },
                    -1,
                    30
                )
            })

            setup()
        </script>
    </body>
</html>
