<html>
    <head>
        <title>TSP</title>
    </head>
    <body>
        <script type="module">
            import * as util from '/src/utils.js'
            import Model from '/models/TspModel.js'

            const model = new Model()
            model.population = 50
            model.stopTickDifference = model.population * 5
            await model.startup()
            model.setup()

            while (!model.done) model.step()
        </script>
    </body>
</html>
