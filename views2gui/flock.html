<html>
    <head>
        <title>Flock</title>
    </head>

    <body>
        <script type="module">
            import Animator from '/src/Animator.js'
            import TwoDraw from '/src/TwoDraw.js'
            import Model from '/models/FlockModel.js'
            import GUIDiv from '/src/GUIDiv.js'

            const model = new Model()
            model.setup()

            const view = new TwoDraw(model, {
                div: 'modelDiv',
                patchSize: 20,
                drawOptions: {
                    turtlesSize: 1.5,
                },
            })

            const anim = new Animator(
                () => {
                    model.step()
                    view.draw()
                },
                500, // how many steps
                30 // at fps steps/second
            ).stop()

            new GUIDiv(
                {
                    patchSize: {
                        slider: [20, [10, 30, 1]],
                        cmd: val => view.reset(val),
                    },
                    fps: {
                        slider: [20, [1, 60, 1]],
                        cmd: val => {
                            anim.setFps(val)
                            // anim.restart(model, view)
                        },
                    },
                    // turtlesSize: {
                    //     slider: [1.5, [1, 10, 0.5]],
                    //     cmd: val => (view.drawOptions.turtlesSize = val),
                    // },
                    population: {
                        slider: [100, [50, 1000, 50]],
                        cmd: val => {
                            model.population = val
                            anim.restart(model, view)
                        },
                    },
                    '---': {},
                    'start/stop': {
                        button: () => {
                            // if (model.done) anim.restart(model, view)
                            anim.toggle()
                        },
                    },
                    step: { button: () => anim.once() },
                    restart: { button: () => anim.restart(model, view) },
                    ticks: { monitor: [anim, 'ticks'] },
                    stopAt: {
                        chooser: [1000, [250, 500, 1000, 2000, 5000]],
                        cmd: val => {
                            anim.setSteps(val)
                            anim.restart(model, view)
                        },
                    },
                    cohesion: { monitor: [model, 'cohesion'] },
                    maxCohesion: { monitor: [model, 'maxCohesion'] },
                },
                {
                    divId: 'controlsDiv1',
                    title: 'Flock Model',
                }
            )
            new GUIDiv(
                {
                    // ticks: { monitor: [anim, 'ticks'] },
                    // turtlesShape: {
                    //     chooser: ['bug', ['bug', 'dart', 'arrow']],
                    //     cmd: val => (view.drawOptions.turtlesShape = val),
                    // },
                    // '----': {},
                    fps: {
                        chooser: [30, [5, 10, 30, 60]],
                        cmd: val => anim.setFps(val),
                    },
                    cohesion: {
                        plot: [[model, 'cohesion'], 300, 50],
                    },
                    // cohesion: { monitor: [model, 'cohesion'] },
                    downloadCanvas: {
                        button: () => view.downloadCanvas(),
                    },
                },
                {
                    divId: 'controlsDiv2',
                }
            )

            Object.assign(window, { model, view, anim })
        </script>
        <div id="controlsDiv1"></div>
        <div id="modelDiv"></div>
        <div id="controlsDiv2"></div>
    </body>
</html>
