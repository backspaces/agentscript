<html>
    <head>
        <title>Hello</title>
    </head>

    <body>
        <script type="module">
            import Animator from 'https://agentscript.org/src/Animator.js'
            import TwoDraw from 'https://agentscript.org/src/TwoDraw.js'
            // import Model from 'https://agentscript.org/models/HelloModel.js'
            import Model from '/models/HelloModel.js'
            import World from '/src/World.js'
            import GUIDiv from '/src/GUIDiv.js'

            const model = new Model()
            model.linksToo = false // start without links
            model.setup()

            const view = new TwoDraw(model, {
                div: 'modelDiv',
                patchSize: 20,
                drawOptions: { turtlesSize: 1.5 },
            })
            view.draw()

            const anim = new Animator(
                () => {
                    model.step()
                    view.draw()
                },
                500, // how many steps
                30 // at fps steps/second
            ).stop()

            new GUIDiv(
                {
                    population: {
                        slider: [100, [10, 500, 10]],
                        cmd: val => {
                            model.population = val
                            anim.restart(model, view)
                        },
                    },

                    turtlesSpeed: {
                        slider: [0.25, [0.01, 0.6, 0.01]],
                        cmd: val => {
                            model.speed = val
                        },
                    },

                    wiggleAngle: {
                        slider: [10, [0, 90, 1]],
                        cmd: val => {
                            model.wiggleAngle = val
                        },
                    },

                    '---- 1': {},

                    patchSize: {
                        slider: [20, [10, 30, 1]],
                        cmd: val => view.reset(val),
                    },

                    turtlesSize: {
                        slider: [1.5, [0.5, 6, 0.5]],
                        cmd: val => {
                            view.drawOptions.turtlesSize = val
                            view.draw()
                        },
                    },

                    startAtCenter: {
                        button: () => {
                            model.startAtCenter = !model.startAtCenter
                            anim.restart(model, view)
                        },
                    },

                    atEdge: {
                        chooser: [
                            'bounce',
                            ['wrap', 'die', 'clamp', 'bounce', 'random'],
                        ],
                        cmd: val => {
                            model.atEdge = val
                            anim.restart(model, view)
                        },
                    },

                    '---- 2': {},

                    'start/stop': {
                        button: () => {
                            if (anim.done) anim.restart(model, view)
                            anim.toggle()
                        },
                    },
                    step: { button: () => anim.once() },
                    restart: { button: () => anim.restart(model, view) },
                    stopAt: {
                        chooser: [1000, [250, 500, 1000, 2000, 5000]],
                        cmd: val => {
                            anim.setSteps(val)
                            anim.restart(model, view)
                        },
                    },
                    ticks: { monitor: [anim, 'ticks'] },
                    done: { monitor: [anim, 'done'] },
                },
                {
                    divId: 'controlsDiv1',
                    title: 'Hello Model',
                }
            )
            const foo = 42
            new GUIDiv(
                {
                    toggleLinks: {
                        button: () => {
                            model.linksToo = !model.linksToo
                            anim.restart(model, view)
                        },
                    },

                    fps: {
                        chooser: [30, [5, 10, 30, 60]],
                        cmd: val => anim.setFps(val),
                    },

                    downloadCanvas: {
                        button: () => view.downloadCanvas(),
                    },

                    ticks: { plot: [model, 'ticks'] },
                    // wiggle: { plot: [this, 'foo'] },
                },
                {
                    divId: 'controlsDiv2',
                }
            )

            Object.assign(window, { model, view, anim })
        </script>
        <div id="controlsDiv1"></div>
        <div id="modelDiv"></div>
        <div id="controlsDiv2"></div>
    </body>
</html>
