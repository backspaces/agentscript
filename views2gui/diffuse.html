<html>
    <head>
        <title>Diffuse</title>
    </head>

    <body>
        <script type="module">
            import Animator from '/src/Animator.js'
            import TwoDraw from '/src/TwoDraw.js'
            import Model from '/models/DiffuseModel.js'
            import ColorMap from '/src/ColorMap.js'
            import GUIDiv from '/src/GUIDiv.js'

            const model = new Model()
            model.setup()

            const view = new TwoDraw(model, {
                div: 'modelDiv',
                patchSize: 3,
                drawOptions: {
                    patchesColor: p => ColorMap.Rgb256.scaleColor(p.ran, 0, 1),
                    turtlesColor: 'yellow',
                    turtlesSize: 8,
                },
            })

            const anim = new Animator(
                () => {
                    model.step()
                    view.draw()
                },
                500, // how many steps
                30 // at fps steps/second
            ).stop()

            new GUIDiv(
                {
                    population: {
                        slider: [4, [1, 20, 1]],
                        cmd: val => {
                            model.population = val
                            anim.restart(model, view)
                        },
                    },

                    turtlesSpeed: {
                        slider: [1, [0, 4, 0.1]],
                        cmd: val => {
                            model.speed = val
                        },
                    },

                    wiggleAngle: {
                        slider: [10, [0, 90, 1]],
                        cmd: val => {
                            model.wiggleAngle = val
                        },
                    },

                    '---- 1': {},

                    patchSize: {
                        slider: [4, [1, 10, 1]],
                        cmd: val => view.reset(val),
                    },

                    turtlesSize: {
                        slider: [4, [1, 6, 1]],
                        cmd: val => {
                            view.drawOptions.turtlesSize = val
                            view.draw()
                        },
                    },

                    turtlesRadius: {
                        slider: [6, [1, 10, 1]],
                        cmd: val => {
                            model.radius = val
                            view.draw()
                        },
                    },

                    '---- 2': {},

                    diffuseRate: {
                        slider: [0.5, [0, 1, 0.01]],
                        cmd: val => {
                            model.diffuseRate = val
                            // view.draw()
                        },
                    },

                    seedDelta: {
                        slider: [0.1, [0, 1, 0.01]],
                        cmd: val => {
                            model.seedDelta = val
                            // view.draw()
                        },
                    },

                    seedMax: {
                        slider: [0.8, [0, 1, 0.01]],
                        cmd: val => {
                            model.seedMax = val
                            // view.draw()
                        },
                    },

                    '---- 3': {},
                    fps: {
                        chooser: [10, [1, 5, 10, 20, 30, 60]],
                        cmd: val => anim.setFps(val),
                    },

                    'start/stop': {
                        button: () => {
                            if (anim.done) anim.restart(model, view)
                            anim.toggle()
                        },
                    },
                    step: { button: () => anim.once() },
                    restart: { button: () => anim.restart(model, view) },
                    stopAt: {
                        chooser: [1000, [250, 500, 1000, 2000, 5000]],
                        cmd: val => {
                            anim.setSteps(val)
                            anim.restart(model, view)
                        },
                    },
                    startAtCenter: {
                        button: () => {
                            model.startAtCenter = !model.startAtCenter
                            anim.restart(model, view)
                        },
                    },
                },
                {
                    divId: 'controlsDiv1',
                    title: 'Diffuse Model',
                }
            )

            new GUIDiv(
                {
                    ticks: { monitor: [anim, 'ticks'] },
                    done: { monitor: [anim, 'done'] },

                    centerPatch: { plot: [model, 'centerPatch'] },
                    downloadCanvas: {
                        button: () => view.downloadCanvas(),
                    },
                },
                {
                    divId: 'controlsDiv2',
                }
            )

            Object.assign(window, { model, view, anim })
        </script>
        <div id="controlsDiv1"></div>
        <div id="modelDiv"></div>
        <div id="controlsDiv2"></div>
    </body>
</html>
