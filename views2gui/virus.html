<html>
    <head>
        <title>Virus</title>
    </head>

    <body>
        <script type="module">
            import Animator from '/src/Animator.js'
            import TwoDraw from '/src/TwoDraw.js'
            import Model from '/models/VirusModel.js'
            import GUIDiv from '/src/GUIDiv.js'

            const model = new Model()
            model.setup()

            const turtleColors = {
                infected: 'red',
                susceptible: 'blue',
                resistant: 'gray',
            }
            function isResistant(l) {
                return (
                    l.end0.state === 'resistant' || l.end1.state === 'resistant'
                )
            }
            const view = new TwoDraw(model, {
                div: 'modelDiv',
                patchSize: 10,
                drawOptions: {
                    patchesColor: 'black',
                    turtlesShape: 'circle',
                    turtlesSize: 1.5,
                    turtlesColor: t => turtleColors[t.state],
                    // linksColor: 'white',
                    linksColor: l => (isResistant(l) ? 'gray' : 'white'),
                    linksWidth: 2,
                },
            })

            const anim = new Animator(
                () => {
                    model.step()
                    view.draw()
                    if (model.done) anim.stop()
                },
                -1, // how many steps
                30 // at fps steps/second
            ).stop()

            new GUIDiv(
                {
                    population: {
                        slider: [150, [10, 300, 5]],
                        cmd: val => {
                            model.population = val
                            anim.restart(model, view)
                        },
                    },

                    // '---- 1': {},

                    patchSize: {
                        slider: [8, [1, 20, 1]],
                        cmd: val => view.reset(val),
                    },

                    '---- 2': {},

                    ticks: { monitor: [anim, 'ticks'] },
                    done: { monitor: [model, 'done'] },
                    'start/stop': {
                        button: () => {
                            if (model.done) anim.restart(model, view)
                            anim.toggle()
                        },
                    },
                    step: { button: () => anim.once() },
                    restart: { button: () => anim.restart(model, view) },

                    susceptible: { monitor: [model, 'susceptible'] },
                    resistant: { monitor: [model, 'resistant'] },
                    infected: { monitor: [model, 'infected'] },

                    // tourLength: { monitor: [model, 'bestTourLength'] },
                    // tourLength: { monitor: [model, 'tourLength'] },
                    // tourChanges: { monitor: [model, 'tourChanges'] },
                    // tourTicks: { monitor: [model, 'bestTourTick'] },
                },
                {
                    divId: 'controlsDiv1',
                    title: 'Virus Model',
                }
            )

            new GUIDiv(
                {
                    fps: {
                        chooser: [30, [5, 10, 30, 60]],
                        cmd: val => anim.setFps(val),
                    },
                    downloadCanvas: {
                        button: () => view.downloadCanvas(),
                    },
                    // tourLength: { plot: [model, 'bestTourLength'] },
                },
                {
                    divId: 'controlsDiv2',
                }
            )

            Object.assign(window, { model, view, anim })
        </script>
        <div id="controlsDiv1"></div>
        <div id="modelDiv"></div>
        <div id="controlsDiv2"></div>
    </body>
</html>
